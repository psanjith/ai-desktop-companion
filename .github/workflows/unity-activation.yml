name: Unity Manual Activation File

on:
  workflow_dispatch:

jobs:
  activation-guidance:
    runs-on: ubuntu-latest
    steps:
      - name: Unity activation guidance
        run: |
          echo "The old .alf GitHub action is deprecated."
          echo "Use the new GameCI flow: https://game.ci/docs/github/activation"
          echo ""
          echo "Personal license:"
          echo "1) Activate Unity locally in Unity Hub (Preferences -> Licenses -> Add)."
          echo "2) Read /Library/Application Support/Unity/Unity_lic.ulf on macOS."
          echo "3) Add secrets UNITY_LICENSE, UNITY_EMAIL, UNITY_PASSWORD in GitHub Actions."
