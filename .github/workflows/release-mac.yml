name: Build and Release macOS app

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Unity macOS player
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: unity-client/DesktopCompanion
          targetPlatform: StandaloneOSX
          buildName: DesktopCompanion
          buildsPath: build

      - name: Resolve app path
        id: paths
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find "$GITHUB_WORKSPACE/build" -type d -name "DesktopCompanion.app" | head -n 1)"
          if [[ -z "$APP_PATH" ]]; then
            echo "DesktopCompanion.app not found"
            exit 1
          fi

          APP_PATH="$(realpath "$APP_PATH")"
          echo "Resolved app path: $APP_PATH"

          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "package_path=$GITHUB_WORKSPACE/build/DesktopCompanion-mac.zip" >> "$GITHUB_OUTPUT"

      - name: Read Unity bundle version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep -E '^  bundleVersion:' unity-client/DesktopCompanion/ProjectSettings/ProjectSettings.asset | head -n1 | awk '{print $2}')
          if [[ -z "$VERSION" ]]; then VERSION="0.0.0"; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package macOS app
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="${{ steps.paths.outputs.app_path }}"
          PACKAGE_PATH="${{ steps.paths.outputs.package_path }}"

          APP_PATH="$(echo "$APP_PATH" | xargs)"
          PACKAGE_PATH="$(echo "$PACKAGE_PATH" | xargs)"

          if [[ ! -d "$APP_PATH" ]]; then
            echo "Primary app path missing: $APP_PATH"
            echo "Searching fallback app path..."
            APP_PATH="$(find "$GITHUB_WORKSPACE/build" -type d -name "DesktopCompanion.app" | head -n 1)"
          fi

          if [[ -z "$APP_PATH" || ! -d "$APP_PATH" ]]; then
            echo "App bundle not found for packaging"
            find "$GITHUB_WORKSPACE/build" -maxdepth 5 -type d -name "*.app" || true
            exit 1
          fi

          APP_PATH="$(realpath "$APP_PATH")"

          mkdir -p "$(dirname "$PACKAGE_PATH")"
          rm -f "$PACKAGE_PATH"
          echo "Packaging: $APP_PATH"
            python3 -m zipfile -c "$PACKAGE_PATH" "$APP_PATH"

          test -s "$PACKAGE_PATH"
          ls -lh "$PACKAGE_PATH"

      - name: Compute SHA256
        id: sha
        shell: bash
        run: |
          set -euo pipefail
          SHA=$(sha256sum "${{ steps.paths.outputs.package_path }}" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Build update manifest
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="v${{ steps.version.outputs.version }}-${{ github.run_number }}"
          PACKAGE_URL="https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/DesktopCompanion-mac.zip"

          cat > build/update.json <<EOF
          {
            "latestVersion": "${{ steps.version.outputs.version }}",
            "url": "${PACKAGE_URL}",
            "sha256": "${{ steps.sha.outputs.sha256 }}",
            "mandatory": false,
            "notes": "Automated release from main (${GITHUB_SHA})"
          }
          EOF

          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: DesktopCompanion ${{ steps.version.outputs.version }} (run ${{ github.run_number }})
          generate_release_notes: true
          make_latest: true
          files: |
            build/DesktopCompanion-mac.zip
            build/update.json
