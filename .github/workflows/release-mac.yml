name: Build and Release macOS app

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  manual-release-notice:
    runs-on: ubuntu-latest

    steps:
      - name: Manual release notice
        run: |
          echo "Unity CI auto-build is disabled due repeated license activation failures."
          echo "Use local release script instead: ./scripts/publish_manual_release.sh <version> <path-to-DesktopCompanion.app>"
          echo "See MANUAL_RELEASE_FLOW.md for full instructions."
